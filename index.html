<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal LKSN GDT 2026</title>
    
    <!-- React & Babel Standalone via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Karla Integration -->
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Karla', sans-serif; overflow-y: hidden; background-color: #ffffff; }
        .app-container { height: 100vh; overflow-y: auto; display: flex; flex-direction: column; justify-content: space-between; }
        .app-container::-webkit-scrollbar { width: 8px; }
        .app-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .app-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* Implementasi Palette Berkas Desain AI */
        .bg-gdt-yellow { background-color: #ffc733; }
        .bg-gdt-blue { background-color: #0284d6; }
        .bg-gdt-green { background-color: #00a551; }
        .bg-gdt-pink { background-color: #ff87df; }
        
        /* Replicating Adobe Illustrator Text Styles Outlined/Colored Specs */
        .ai-style-blue-huge { color: #2982C5; font-size: 11.5rem; line-height: 1; font-weight: 800; }
        .ai-style-pink-sub { color: #E38EBC; font-size: 2.2rem; font-weight: 700; }
        .ai-style-banner-text { color: #E38EBC; font-size: 2.5rem; font-weight: 800; tracking-wide: 0.05em; }
        
        /* Pola Border Blok Catur Kecil (Hijau - Biru) */
        .geo-border {
            height: 16px;
            width: 100%;
            background-image: linear-gradient(45deg, #00a551 25%, #0284d6 25%, #0284d6 50%, #00a551 50%, #00a551 75%, #0284d6 75%, #0284d6 100%);
            background-size: 32px 32px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Menghubungkan File Database Internal Lokal -->
    <script src="data-internal.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const GdtLogo = () => (
            <svg className="h-10 w-auto" id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270.61 71.33">
                <defs><style>{`.cls-1{fill:#00a551;}.cls-2{fill:#602c05;}`}</style></defs>

                    <g>
                        <path className="cls-1" d="M177.67,45.95l1.15-2.61c.43-.97,1.56-1.44,2.53-1.02,2.19.95,4.86,1.51,7.32,1.51,3.06,0,4.06-.67,4.06-1.77,0-3.48-15.28.48-15.28-9.88,0-4.87,4.49-8.59,12.6-8.59,2.83,0,5.89.47,8.33,1.35,1.06.38,1.56,1.6,1.1,2.63l-1.14,2.59c-.42.96-1.53,1.37-2.51.97-1.99-.8-3.95-1.09-5.73-1.09-3.06,0-4.15.86-4.15,1.82,0,3.58,15.23-.29,15.23,9.98,0,4.77-4.39,8.5-12.79,8.5-3.51,0-7.11-.7-9.71-1.79-1-.42-1.44-1.59-1.01-2.58Z"/>
                        <path className="cls-1" d="M215.43,40.82l-2.67,2.72v4.4c0,1.08-.88,1.95-1.95,1.95h-5.16c-1.08,0-1.95-.88-1.95-1.95v-31.41c0-1.14.92-2.06,2.06-2.06h5.05c1.08,0,1.95.88,1.95,1.95v16.62l8.69-8.47c.37-.36.85-.55,1.36-.55h5.33c1.73,0,2.61,2.08,1.4,3.32l-7.53,7.76,9.16,11.64c1.01,1.28.1,3.16-1.54,3.16h-6.01c-.59,0-1.16-.27-1.53-.73l-6.67-8.34Z"/>
                        <path className="cls-1" d="M233,16.33c0-2.72,2.2-4.82,5.54-4.82s5.54,1.96,5.54,4.68c0,2.86-2.2,4.97-5.54,4.97s-5.54-2.1-5.54-4.82ZM235.95,24.02h5.16c1.08,0,1.95.88,1.95,1.95v21.97c0,1.08-.88,1.95-1.95,1.95h-5.16c-1.08,0-1.95-.88-1.95-1.95v-21.97c0-1.08.88-1.95,1.95-1.95Z"/>
                        <path className="cls-1" d="M249.49,14.47h5.16c1.08,0,1.95.88,1.95,1.95v31.51c0,1.08-.88,1.95-1.95,1.95h-5.16c-1.08,0-1.95-.88-1.95-1.95v-31.51c0-1.08.88-1.95,1.95-1.95Z"/>
                        <path className="cls-1" d="M263.49,14.47h5.16c1.08,0,1.95.88,1.95,1.95v31.51c0,1.08-.88,1.95-1.95,1.95h-5.16c-1.08,0-1.95-.88-1.95-1.95v-31.51c0-1.08.88-1.95,1.95-1.95Z"/>
                    </g>
                </g>
                <g>
                    <g id="_7" data-name=" 7"><path className="cls-2" d="M35.67,71.33c-2.06,0-3.72-1.67-3.72-3.72v-10.65c0-2.06,1.67-3.72,3.72-3.72s3.72,1.67,3.72,3.72v10.65c0,2.06-1.67,3.72-3.72,3.72Z"/></g>
                    <g id="_6" data-name=" 6"><path className="cls-2" d="M58.25,61.97c-.95,0-1.9-.36-2.63-1.09l-7.53-7.53c-1.45-1.45-1.45-3.81,0-5.26s3.81-1.45,5.26,0l7.53,7.53c1.45,1.45,1.45,3.81,0,5.26-.73.73-1.68,1.09-2.63,1.09Z"/></g>
                    <g id="_5" data-name=" 5"><path className="cls-2" d="M67.61,39.39h-10.65c-2.06,0-3.72-1.67-3.72-3.72s1.67-3.72,3.72-3.72h10.65c2.06,0,3.72,1.67,3.72,3.72s-1.67,3.72-3.72,3.72h0Z"/></g>
                    <g id="_4" data-name=" 4"><path className="cls-2" d="M50.72,24.33c-.95,0-1.9-.36-2.63-1.09-1.45-1.45-1.45-3.81,0-5.26l7.53-7.53c1.45-1.45,3.81-1.45,5.26,0,1.45,1.45,1.45,3.81,0,5.26l-7.53,7.53c-.73.73-1.68,1.09-2.63,1.09h0Z"/></g>
                    <g id="_3" data-name=" 3"><path className="cls-2" d="M35.67,18.09c-2.06,0-3.72-1.67-3.72-3.72V3.72c0-2.06,1.67-3.72,3.72-3.72s3.72,1.67,3.72,3.72v10.65c0,2.06-1.67,3.72-3.72,3.72Z"/></g>
                    <g id="_2" data-name=" 2"><path className="cls-2" d="M20.61,24.33c-.95,0-1.9-.36-2.63-1.09l-7.53-7.53c-1.45-1.45-1.45-3.81,0-5.26,1.45-1.45,3.81-1.45,5.26,0l7.53,7.53c1.45,1.45,1.45,3.81,0,5.26-.73.73-1.68,1.09-2.63,1.09h0Z"/></g>
                    <g id="_1" data-name=" 1"><path className="cls-2" d="M14.37,39.39H3.72c-2.06,0-3.72-1.67-3.72-3.72s1.67-3.72,3.72-3.72h10.65c2.06,0,3.72,1.67,3.72,3.72s-1.67,3.72-3.72,3.72h0Z"/></g>
                    <g id="tongkat"><path className="cls-2" d="M13.08,61.97c-.95,0-1.9-.36-2.63-1.09-1.45-1.45-1.45-3.81,0-5.26l22.59-22.59c1.45-1.45,3.81-1.45,5.26,0,1.45,1.45,1.45,3.81,0,5.26l-22.59,22.59c-.73.73-1.68,1.09-2.63,1.09Z"/></g>
                </g>
            </svg>
        );

        const App = () => {
            const [systemTime, setSystemTime] = useState(new Date());
            const [currentView, setCurrentView] = useState('home');

            useEffect(() => {
                // Mesin sinkronisasi waktu digital per 1 detik
                const timer = setInterval(() => setSystemTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Mengidentifikasi status agenda real-time dari database mikro harian
            const currentAgenda = useMemo(() => {
                const currentFormattedDate = systemTime.toISOString().split('T')[0];
                const dayMatch = GDT_MICRO_TIMELINE.filter(t => t.tanggal === currentFormattedDate);
                
                const match = dayMatch.find(t => {
                    const start = new Date(`${t.tanggal}T${t.start}:00`);
                    const end = new Date(`${t.tanggal}T${t.end}:00`);
                    return systemTime >= start && systemTime <= end;
                });
                return match ? { title: match.kegiatan, end: new Date(`${match.tanggal}T${match.end}:00`) } : null;
            }, [systemTime]);

            const nextAgenda = useMemo(() => {
                const future = GDT_MICRO_TIMELINE.filter(t => {
                    const start = new Date(`${t.tanggal}T${t.start}:00`);
                    return start > systemTime;
                }).sort((a, b) => new Date(`${a.tanggal}T${a.start}:00`) - new Date(`${b.tanggal}T${b.start}:00`));
                
                return future.length ? future[0] : { kegiatan: "Kompetisi Berakhir" };
            }, [systemTime]);

            // Format jam mundur sesuai parameter desain font Illustrator
            const countdownText = useMemo(() => {
                let target = null;
                if (currentAgenda) target = currentAgenda.end;
                else if (nextAgenda && nextAgenda.tanggal) target = new Date(`${nextAgenda.tanggal}T${nextAgenda.start}:00`);
                
                if (!target) return { h: '00', m: '00', s: '00' };
                const diff = target - systemTime;
                if (diff <= 0) return { h: '00', m: '00', s: '00' };
                
                const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
                const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                return { h, m, s };
            }, [currentAgenda, nextAgenda, systemTime]);

            return (
                <div className="app-container">
                    {/* BINGKAI ATAS: BLOK DIAGRAM HEADER */}
                    <div>
                        <div className="geo-border"></div>
                        <header className="flex h-[80px] w-full border-b border-gray-200 bg-white items-center">
                            <div className="flex w-1/4 items-center justify-center border-r border-gray-200 px-6 h-full">
                                <GdtLogo />
                            </div>
                            <div className="w-12 h-full bg-gdt-yellow"></div>
                            <div className="flex flex-1 h-full bg-gdt-blue px-2 relative overflow-hidden">
                                <div className="w-4 h-full bg-gdt-pink absolute left-20"></div>
                                <div className="w-1.5 h-full bg-gdt-pink absolute left-26"></div>
                            </div>
                            <div className="flex w-2/5 h-full items-center justify-end px-10 bg-white">
                                <span className="ai-style-banner-text">{GDT_CONFIG.headline}</span>
                            </div>
                        </header>
                    </div>

                    {/* PLATFORM UTAMA INTERAKTIF */}
                    <main className="flex-1 p-8 max-w-7xl w-full mx-auto flex flex-col justify-center">
                        {currentView === 'home' && (
                            <div className="flex h-full gap-8 items-center">
                                {/* Dashboard Kiri: Mesin Hitung Mundur Vektor */}
                                <div className="flex-1 flex flex-col items-center justify-center text-center">
                                    <h2 className="ai-style-pink-sub mb-2">
                                        {currentAgenda ? `<< ${currentAgenda.title} >>` : '<< Agenda Berikutnya >>'}
                                    </h2>
                                    
                                    <div className="flex items-center gap-2 ai-style-blue-huge select-none">
                                        <span>{countdownText.h}</span>
                                        <span>:</span>
                                        <span className="text-gdt-pink">{countdownText.m}</span>
                                        <span>:</span>
                                        <span>{countdownText.s}</span>
                                    </div>
                                    
                                    <p className="text-xl font-bold text-gdt-pink mt-2 tracking-widest uppercase">Jam : Menit : Detik</p>
                                </div>

                                {/* Dashboard Kanan: Blok Status Widget Hijau */}
                                <div className="w-[360px] flex flex-col gap-6">
                                    <div>
                                        <h3 className="text-lg font-bold text-[#2982C5] mb-2">Waktu Sistem :</h3>
                                        <div className="bg-gdt-green p-6 text-white font-bold shadow-md rounded-none">
                                            <div className="text-3xl tracking-wide">{systemTime.toLocaleTimeString('id-ID')} WIB</div>
                                            <div className="text-sm font-normal opacity-90 mt-1">
                                                {systemTime.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="text-lg font-bold text-[#2982C5] mb-2">Agenda Selanjutnya:</h3>
                                        <div className="bg-gdt-green p-6 min-h-[140px] text-white font-bold shadow-md rounded-none flex flex-col justify-between">
                                            <div className="text-2xl leading-snug">{nextAgenda.kegiatan}</div>
                                            {nextAgenda.start && (
                                                <div className="text-xs font-normal opacity-80 mt-2">
                                                    Waktu: {nextAgenda.start} - {nextAgenda.end} WIB ({nextAgenda.tanggal})
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentView === 'modul' && (
                            <div className="h-full flex flex-col justify-start">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-bold text-[#2982C5]">Akses Lembar Kerja & Modul</h2>
                                    <button onClick={() => setCurrentView('home')} className="px-4 py-2 bg-gdt-blue text-white font-bold text-sm">Kembali ke Home</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {GDT_MODULES.map(m => {
                                        const isReleased = systemTime >= new Date(m.releaseTime);
                                        return (
                                            <div key={m.id} className="border-2 border-gray-200 p-6 flex items-center justify-between bg-white shadow-sm hover:border-gdt-blue transition-all">
                                                <div>
                                                    <h4 className="text-xl font-bold text-gray-800">{m.title}</h4>
                                                    <p className="text-xs text-gray-400 mt-1">Rilis Otomatis: {m.releaseTime.replace('T', ' ')} WIB</p>
                                                </div>
                                                {isReleased ? (
                                                    <a href={m.link} target="_blank" rel="noreferrer" className="px-5 py-3 bg-gdt-blue text-white font-bold text-sm tracking-wide shadow hover:opacity-95">Buka Modul</a>
                                                ) : (
                                                    <div className="flex items-center gap-2 px-4 py-3 bg-gray-200 text-gray-500 font-bold text-sm select-none">🔒 Terkunci</div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {currentView === 'jadwal' && (
                            <div className="h-full flex flex-col justify-start overflow-hidden">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-bold text-[#2982C5]">Jadwal Pelaksanaan Makro</h2>
                                    <button onClick={() => setCurrentView('home')} className="px-4 py-2 bg-gdt-blue text-white font-bold text-sm">Kembali ke Home</button>
                                </div>
                                <div className="border border-gray-200 overflow-y-auto max-h-[450px]">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-gdt-pink text-white font-bold text-sm">
                                                <th className="p-4 w-16">No</th>
                                                <th className="p-4 w-48">Tanggal & Hari</th>
                                                <th className="p-4">Kegiatan</th>
                                                <th className="p-4 w-48">Fase</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-200 bg-white font-medium text-gray-700">
                                            {GDT_MACRO_SCHEDULE.map((s, idx) => (
                                                <tr key={idx} className="hover:bg-gray-50 text-sm">
                                                    <td className="p-4 font-bold text-[#2982C5]">{s.no}</td>
                                                    <td className="p-4">
                                                        <div className="font-bold text-[#0284d6]">{s.kode}</div>
                                                        <div className="text-xs text-gray-500">{s.tanggal}</div>
                                                    </td>
                                                    <td className="p-4 text-gray-900 font-semibold">{s.kegiatan}</td>
                                                    <td className="p-4 text-xs font-bold text-[#00a551]">{s.fase}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BINGKAI BAWAH: NAVIGASI BAR HORIZONTAL DOCK */}
                    <div>
                        <div className="geo-border"></div>
                        <footer className="bg-gdt-green p-4 flex justify-between items-center select-none">
                            <div className="w-24 h-12 bg-gdt-pink relative overflow-hidden hidden md:block">
                                <div className="w-full h-2 bg-gdt-blue absolute top-3"></div>
                                <div className="w-full h-2 bg-gdt-blue absolute top-7"></div>
                            </div>
                            
                            <div className="flex flex-1 justify-center gap-4 max-w-5xl mx-auto">
                                <button onClick={() => setCurrentView('modul')} className={`flex-1 max-w-[220px] h-14 bg-white font-bold text-[#0284d6] text-lg hover:bg-gdt-yellow hover:text-white transition-all shadow-md rounded-none ${currentView === 'modul' ? 'ring-4 ring-gdt-pink' : ''}`}>
                                    Akses Modul
                                </button>
                                <a href={GDT_CONFIG.submissionLink} target="_blank" rel="noreferrer" className="flex-1 max-w-[220px] h-14 bg-white font-bold text-[#0284d6] text-lg hover:bg-gdt-yellow hover:text-white transition-all shadow-md flex items-center justify-center rounded-none">
                                    Folder Pengumpulan
                                </a>
                                <button onClick={() => setCurrentView('jadwal')} className={`flex-1 max-w-[220px] h-14 bg-white font-bold text-[#0284d6] text-lg hover:bg-gdt-yellow hover:text-white transition-all shadow-md rounded-none ${currentView === 'jadwal' ? 'ring-4 ring-gdt-pink' : ''}`}>
                                    Jadwal Kompetisi
                                </button>
                                <a href={GDT_CONFIG.importantLinks} target="_blank" rel="noreferrer" className="flex-1 max-w-[220px] h-14 bg-white font-bold text-[#0284d6] text-lg hover:bg-gdt-yellow hover:text-white transition-all shadow-md flex items-center justify-center rounded-none">
                                    Link-Link Penting
                                </a>
                            </div>

                            <div className="w-24 h-12 bg-gdt-blue relative overflow-hidden hidden md:block">
                                <div className="w-full h-1.5 bg-gdt-pink absolute top-2"></div>
                                <div className="w-full h-1.5 bg-gdt-pink absolute top-5"></div>
                                <div className="w-full h-1.5 bg-gdt-pink absolute top-8"></div>

        };
